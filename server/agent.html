<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客服控制台 - Chat Widget Test Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 320px;
      background: #1f2937;
      color: white;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #374151;
    }
    .sidebar-header h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .search-box {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #4b5563;
      border-radius: 6px;
      background: #374151;
      color: white;
      font-size: 13px;
      outline: none;
    }
    .search-box::placeholder { color: #9ca3af; }
    .search-box:focus { border-color: #6366f1; }
    .filter-bar {
      display: flex;
      gap: 4px;
      padding: 8px 20px;
      border-bottom: 1px solid #374151;
      flex-wrap: wrap;
      position: relative;
    }
    .filter-btn {
      padding: 4px 10px;
      border: 1px solid #4b5563;
      border-radius: 4px;
      background: transparent;
      color: #9ca3af;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #6366f1; color: #c7d2fe; }
    .filter-btn.active { background: #4f46e5; border-color: #4f46e5; color: white; }
    .tag-filter-wrap {
      position: relative;
      display: inline-block;
    }
    .tag-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      background: #374151;
      border: 1px solid #4b5563;
      border-radius: 6px;
      padding: 6px 0;
      min-width: 140px;
      z-index: 100;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .tag-dropdown.show { display: block; }
    .tag-dropdown-item {
      padding: 6px 12px;
      font-size: 12px;
      color: #d1d5db;
      cursor: pointer;
      transition: background 0.1s;
    }
    .tag-dropdown-item:hover { background: #4b5563; }
    .tag-dropdown-item.active { color: #a5b4fc; font-weight: 600; }
    .visitor-list {
      flex: 1;
      overflow-y: auto;
    }
    .visitor-item {
      padding: 12px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .visitor-item:hover { background: #374151; }
    .visitor-item.active { background: #374151; border-left-color: #4f46e5; }
    .visitor-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      position: relative;
    }
    .visitor-avatar .online-dot, .visitor-avatar .offline-dot {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #1f2937;
    }
    .visitor-avatar .online-dot { background: #22c55e; }
    .visitor-avatar .offline-dot { background: #6b7280; }
    .visitor-info { flex: 1; min-width: 0; }
    .visitor-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .visitor-name .tag {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      color: white;
    }
    .tag-online { background: #22c55e; }
    .tag-offline { background: #6b7280; }
    .tag-pending { background: #f59e0b; }
    .tag-in_progress { background: #3b82f6; }
    .tag-resolved { background: #22c55e; }
    .visitor-last-msg {
      font-size: 12px;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .visitor-id-preview {
      font-size: 10px;
      opacity: 0.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .visitor-item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .unreplied-badge {
      background: #ef4444;
      color: white;
      font-size: 10px;
      font-weight: 600;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }
    .claimed-indicator {
      font-size: 9px;
      color: #f59e0b;
      max-width: 70px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .controls {
      padding: 12px 20px;
      border-top: 1px solid #374151;
    }
    .toggle-btn {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.on { background: #22c55e; color: white; }
    .toggle-btn.off { background: #6b7280; color: white; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .header {
      background: white;
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h3 { font-size: 16px; font-weight: 600; }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #6b7280;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }
    .visitor-preview {
      padding: 0 24px;
      background: #eef2ff;
      border-bottom: 1px solid #c7d2fe;
      color: #4338ca;
      font-size: 12px;
    }
    .preview-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 8px 0;
    }
    .preview-row p { padding: 0; }
    .session-status-select {
      padding: 4px 8px;
      border: 1px solid #c7d2fe;
      border-radius: 4px;
      background: white;
      color: #4338ca;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }
    .claim-btn {
      padding: 4px 12px;
      border: 1px solid #c7d2fe;
      border-radius: 4px;
      background: white;
      color: #4338ca;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .claim-btn:hover { background: #4f46e5; color: white; }
    .claim-btn.release { background: #f59e0b; color: white; border-color: #f59e0b; }
    .claim-btn.release:hover { background: #d97706; }
    .claimed-by-info {
      font-size: 11px;
      color: #6366f1;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .claimed-warning {
      font-size: 11px;
      color: #ef4444;
      display: flex;
      align-items: center;
      gap: 4px;
      background: #fef2f2;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #fecaca;
    }
    .preview-section {
      padding: 6px 0;
      border-top: 1px solid #c7d2fe;
    }
    .preview-section:first-of-type {
      border-top: none;
    }
    .preview-section-label {
      font-size: 10px;
      color: #818cf8;
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .session-notes-textarea {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #c7d2fe;
      border-radius: 4px;
      background: white;
      color: #312e81;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 50px;
      max-height: 120px;
      outline: none;
    }
    .session-notes-textarea::placeholder { color: #a5b4fc; }
    .session-notes-textarea:focus { border-color: #4f46e5; }
    .session-tags-input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #c7d2fe;
      border-radius: 4px;
      background: white;
      color: #312e81;
      font-size: 12px;
      outline: none;
    }
    .session-tags-input::placeholder { color: #a5b4fc; }
    .session-tags-input:focus { border-color: #4f46e5; }
    .tags-display {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .tag-chip {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: #c7d2fe;
      color: #312e81;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f9fafb;
    }
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .message { max-width: 70%; margin-bottom: 12px; }
    .message.visitor { margin-left: auto; }
    .message-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .message.visitor .message-bubble {
      background: #4f46e5;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.agent .message-bubble {
      background: white;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }
    .message-meta { font-size: 11px; color: #9ca3af; margin-top: 4px; padding: 0 4px; }
    .message.visitor .message-meta { text-align: right; }
    .message-type-indicator { font-size: 11px; padding: 0 4px 4px; opacity: 0.6; }
    .input-area {
      background: white;
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
    }
    .input-area textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 40px;
      max-height: 120px;
    }
    .input-area textarea:focus { border-color: #4f46e5; }
    .input-area button {
      padding: 0 24px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .input-area button:hover { opacity: 0.9; }
    .input-area button:disabled { background: #d1d5db; cursor: not-allowed; }
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 14px;
    }
    .typing-indicator {
      padding: 4px 20px;
      font-size: 12px;
      color: #6b7280;
      font-style: italic;
    }
    .no-results {
      padding: 20px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>💬 客服控制台</h2>
      <input type="text" class="search-box" id="searchBox" placeholder="搜索访客名、ID 或消息内容..." />
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="online">在线</button>
      <button class="filter-btn" data-filter="offline">离线</button>
      <button class="filter-btn" data-filter="unreplied">未回复</button>
      <button class="filter-btn" data-filter="pending">待处理</button>
      <button class="filter-btn" data-filter="in_progress">跟进中</button>
      <button class="filter-btn" data-filter="resolved">已解决</button>
      <div class="tag-filter-wrap">
        <button class="filter-btn" id="tagFilterBtn" data-filter="tag">按标签</button>
        <div class="tag-dropdown" id="tagDropdown"></div>
      </div>
    </div>
    <div class="visitor-list" id="visitorList">
      <div class="no-results">暂无访客</div>
    </div>
    <div class="controls">
      <button class="toggle-btn on" id="autoReplyToggle">自动回复：开启</button>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <h3 id="chatTitle">选择一个访客开始对话</h3>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">已连接到服务器</span>
      </div>
    </div>
    <div class="visitor-preview" id="visitorPreview" style="display: none;">
      <div class="preview-row">
        <p>访客：<span id="visitorInfo"></span></p>
        <p>状态：<span id="visitorStatus"></span></p>
        <p>会话：<select class="session-status-select" id="sessionStatusSelect">
          <option value="pending">待处理</option>
          <option value="in_progress">跟进中</option>
          <option value="resolved">已解决</option>
        </select></p>
        <span class="claimed-by-info" id="claimedByInfo" style="display: none;"></span>
        <span class="claimed-warning" id="claimedWarning" style="display: none;">⚠️ 被其他客服接手</span>
        <button class="claim-btn" id="claimBtn" style="display: none;">接手</button>
      </div>
      <div class="preview-section">
        <div class="preview-section-label">内部备注</div>
        <textarea class="session-notes-textarea" id="sessionNotes" placeholder="添加内部备注..."></textarea>
      </div>
      <div class="preview-section">
        <div class="preview-section-label">标签</div>
        <input type="text" class="session-tags-input" id="sessionTags" placeholder="输入标签，用逗号分隔..." />
        <div class="tags-display" id="tagsDisplay"></div>
      </div>
    </div>
    <div class="chat-area">
      <div class="message-list" id="messageList">
        <div class="empty-state">选择左侧访客查看对话</div>
      </div>
      <div class="typing-indicator" id="typingIndicator" style="display: none;"></div>
      <div class="input-area">
        <textarea id="messageInput" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行" disabled></textarea>
        <button id="sendBtn" disabled>发送</button>
      </div>
    </div>
  </div>

  <script>
    const ws = new WebSocket('ws://localhost:8080?role=agent');
    const visitors = new Map();
    let currentVisitorId = null;
    let autoReplyEnabled = true;
    let typingTimeout = null;
    let currentFilter = 'all';
    let selectedTagFilter = null;
    let searchQuery = '';
    let myAgentId = null;
    let myAgentName = null;
    let noteSaveTimeout = null;
    let tagsSaveTimeout = null;

    const visitorListEl = document.getElementById('visitorList');
    const messageListEl = document.getElementById('messageList');
    const messageInputEl = document.getElementById('messageInput');
    const sendBtnEl = document.getElementById('sendBtn');
    const chatTitleEl = document.getElementById('chatTitle');
    const statusDotEl = document.getElementById('statusDot');
    const statusTextEl = document.getElementById('statusText');
    const autoReplyToggleEl = document.getElementById('autoReplyToggle');
    const visitorPreviewEl = document.getElementById('visitorPreview');
    const visitorInfoEl = document.getElementById('visitorInfo');
    const visitorStatusEl = document.getElementById('visitorStatus');
    const typingIndicatorEl = document.getElementById('typingIndicator');
    const sessionStatusSelectEl = document.getElementById('sessionStatusSelect');
    const searchBoxEl = document.getElementById('searchBox');
    const tagFilterBtnEl = document.getElementById('tagFilterBtn');
    const tagDropdownEl = document.getElementById('tagDropdown');
    const sessionNotesEl = document.getElementById('sessionNotes');
    const sessionTagsEl = document.getElementById('sessionTags');
    const tagsDisplayEl = document.getElementById('tagsDisplay');
    const claimBtnEl = document.getElementById('claimBtn');
    const claimedByInfoEl = document.getElementById('claimedByInfo');
    const claimedWarningEl = document.getElementById('claimedWarning');

    ws.onopen = () => {
      statusDotEl.className = 'status-dot';
      statusTextEl.textContent = '已连接到服务器';
    };

    ws.onclose = () => {
      statusDotEl.className = 'status-dot disconnected';
      statusTextEl.textContent = '连接断开，请刷新页面重连';
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.action === 'init') {
        const payload = data.payload;
        myAgentId = payload.agentId || null;
        myAgentName = payload.agentName || null;
        const visitorList = payload.visitors;
        visitorList.forEach(v => {
          visitors.set(v.visitorId, {
            name: v.visitorName,
            online: v.online || false,
            lastSeen: v.lastSeen || 0,
            messages: v.messages || [],
            sessionStatus: v.sessionStatus || 'pending',
            note: v.note || '',
            tags: v.tags || [],
            claimedBy: v.claimedBy || null,
            claimedByName: v.claimedByName || null,
            unrepliedCount: v.unrepliedCount || 0,
          });
        });
        renderVisitorList();
        renderTagDropdown();
      } else if (data.action === 'message') {
        const msg = data.payload;
        const visitorId = msg.visitorId;

        if (!visitors.has(visitorId)) {
          visitors.set(visitorId, {
            name: msg.visitorName || '访客',
            online: true,
            lastSeen: Date.now(),
            messages: [],
            sessionStatus: 'pending',
            note: '',
            tags: [],
            claimedBy: null,
            claimedByName: null,
            unrepliedCount: 0,
          });
        }

        const visitor = visitors.get(visitorId);
        if (!visitor.messages.some(m => m.id === msg.id)) {
          visitor.messages.push(msg);
        }
        visitor.lastSeen = Date.now();
        if (typeof msg.unrepliedCount === 'number') {
          visitor.unrepliedCount = msg.unrepliedCount;
        }
        renderVisitorList();

        if (visitorId === currentVisitorId) {
          renderMessages();
        }
      } else if (data.action === 'visitor_online') {
        const payload = data.payload;
        if (visitors.has(payload.visitorId)) {
          visitors.get(payload.visitorId).online = true;
          visitors.get(payload.visitorId).lastSeen = Date.now();
          if (payload.sessionStatus) {
            visitors.get(payload.visitorId).sessionStatus = payload.sessionStatus;
          }
        } else {
          visitors.set(payload.visitorId, {
            name: payload.visitorName || '访客',
            online: true,
            lastSeen: Date.now(),
            messages: [],
            sessionStatus: payload.sessionStatus || 'pending',
            note: '',
            tags: [],
            claimedBy: null,
            claimedByName: null,
            unrepliedCount: 0,
          });
        }
        renderVisitorList();
        if (payload.visitorId === currentVisitorId) {
          updateVisitorStatus();
        }
      } else if (data.action === 'visitor_offline') {
        const payload = data.payload;
        if (visitors.has(payload.visitorId)) {
          visitors.get(payload.visitorId).online = false;
          visitors.get(payload.visitorId).lastSeen = Date.now();
        }
        renderVisitorList();
        if (payload.visitorId === currentVisitorId) {
          updateVisitorStatus();
        }
      } else if (data.action === 'session_status') {
        const { visitorId, sessionStatus } = data.payload;
        if (visitors.has(visitorId)) {
          visitors.get(visitorId).sessionStatus = sessionStatus;
        }
        renderVisitorList();
        if (visitorId === currentVisitorId) {
          sessionStatusSelectEl.value = sessionStatus;
        }
      } else if (data.action === 'session_note') {
        const { visitorId, note } = data.payload;
        if (visitors.has(visitorId)) {
          visitors.get(visitorId).note = note;
        }
        if (visitorId === currentVisitorId) {
          sessionNotesEl.value = note;
        }
      } else if (data.action === 'session_tags') {
        const { visitorId, tags } = data.payload;
        if (visitors.has(visitorId)) {
          visitors.get(visitorId).tags = tags;
        }
        renderTagDropdown();
        renderVisitorList();
        if (visitorId === currentVisitorId) {
          sessionTagsEl.value = tags.join(', ');
          renderTagsChips(tags);
        }
      } else if (data.action === 'session_claim_update') {
        const { visitorId, claimedBy, claimedByName } = data.payload;
        if (visitors.has(visitorId)) {
          visitors.get(visitorId).claimedBy = claimedBy;
          visitors.get(visitorId).claimedByName = claimedByName;
        }
        renderVisitorList();
        if (visitorId === currentVisitorId) {
          updateClaimUI();
        }
      } else if (data.action === 'typing_start') {
        const visitorId = data.payload.visitorId;
        if (visitorId === currentVisitorId) {
          typingIndicatorEl.textContent = '访客正在输入...';
          typingIndicatorEl.style.display = 'block';
        }
      } else if (data.action === 'typing_stop') {
        typingIndicatorEl.style.display = 'none';
      } else if (data.action === 'auto_reply_on') {
        autoReplyEnabled = true;
        updateAutoReplyBtn();
      } else if (data.action === 'auto_reply_off') {
        autoReplyEnabled = false;
        updateAutoReplyBtn();
      }
    };

    function isUnreplied(visitor) {
      return visitor.unrepliedCount > 0;
    }

    function matchesSearch(visitor, id) {
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      if (visitor.name.toLowerCase().includes(q)) return true;
      if (id.toLowerCase().includes(q)) return true;
      return visitor.messages.some(m =>
        m.type === 'text' && m.content && m.content.toLowerCase().includes(q)
      );
    }

    function matchesFilter(visitor) {
      switch (currentFilter) {
        case 'online': return visitor.online;
        case 'offline': return !visitor.online;
        case 'unreplied': return isUnreplied(visitor);
        case 'pending': return visitor.sessionStatus === 'pending';
        case 'in_progress': return visitor.sessionStatus === 'in_progress';
        case 'resolved': return visitor.sessionStatus === 'resolved';
        case 'tag': return selectedTagFilter ? visitor.tags.includes(selectedTagFilter) : true;
        default: return true;
      }
    }

    function getAllTags() {
      const tagSet = new Set();
      visitors.forEach(v => {
        (v.tags || []).forEach(t => tagSet.add(t));
      });
      return Array.from(tagSet).sort();
    }

    function renderTagDropdown() {
      const tags = getAllTags();
      if (tags.length === 0) {
        tagDropdownEl.innerHTML = '<div class="tag-dropdown-item" style="color: #6b7280; cursor: default;">暂无标签</div>';
        return;
      }
      tagDropdownEl.innerHTML = '<div class="tag-dropdown-item' + (!selectedTagFilter ? ' active' : '') + '" data-tag="">全部标签</div>' +
        tags.map(t =>
          '<div class="tag-dropdown-item' + (selectedTagFilter === t ? ' active' : '') + '" data-tag="' + escapeHtml(t) + '">' + escapeHtml(t) + '</div>'
        ).join('');

      tagDropdownEl.querySelectorAll('.tag-dropdown-item[data-tag]').forEach(item => {
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          const tag = item.dataset.tag;
          selectedTagFilter = tag || null;
          currentFilter = 'tag';
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          tagFilterBtnEl.classList.add('active');
          tagDropdownEl.classList.remove('show');
          renderVisitorList();
          renderTagDropdown();
        });
      });
    }

    function renderVisitorList() {
      const filtered = Array.from(visitors.entries())
        .filter(([id, v]) => matchesFilter(v) && matchesSearch(v, id))
        .sort((a, b) => {
          if (currentFilter === 'unreplied') {
            const aUnreplied = isUnreplied(a[1]);
            const bUnreplied = isUnreplied(b[1]);
            if (aUnreplied !== bUnreplied) return aUnreplied ? -1 : 1;
          }
          if (a[1].online !== b[1].online) return a[1].online ? -1 : 1;
          const lastA = a[1].messages[a[1].messages.length - 1]?.timestamp || a[1].lastSeen || 0;
          const lastB = b[1].messages[b[1].messages.length - 1]?.timestamp || b[1].lastSeen || 0;
          return lastB - lastA;
        });

      if (filtered.length === 0) {
        visitorListEl.innerHTML = '<div class="no-results">' + (visitors.size === 0 ? '暂无访客' : '无匹配结果') + '</div>';
        return;
      }

      visitorListEl.innerHTML = filtered.map(([id, v]) => {
        const lastMsg = v.messages.length > 0 ? v.messages[v.messages.length - 1] : null;
        const lastMsgText = lastMsg
          ? (lastMsg.type === 'image' ? '[图片]' : (lastMsg.content || '').substring(0, 20))
          : '暂无消息';
        const initial = (v.name || '访').charAt(0);
        const statusLabel = { pending: '待处理', in_progress: '跟进中', resolved: '已解决' }[v.sessionStatus] || '待处理';
        const showBadge = v.unrepliedCount > 0;
        const isClaimedByOther = v.claimedBy && v.claimedBy !== myAgentId;

        return `
          <div class="visitor-item ${id === currentVisitorId ? 'active' : ''}" data-id="${id}">
            <div class="visitor-avatar">
              ${escapeHtml(initial)}
              <span class="${v.online ? 'online-dot' : 'offline-dot'}"></span>
            </div>
            <div class="visitor-info">
              <div class="visitor-name">
                ${escapeHtml(v.name)}
                <span class="tag ${v.online ? 'tag-online' : 'tag-offline'}">${v.online ? '在线' : '离线'}</span>
                <span class="tag tag-${v.sessionStatus}">${statusLabel}</span>
              </div>
              <div class="visitor-last-msg">${escapeHtml(lastMsgText)}</div>
              <div class="visitor-id-preview">${escapeHtml(id)}</div>
            </div>
            <div class="visitor-item-right">
              ${showBadge ? '<span class="unreplied-badge">' + v.unrepliedCount + '</span>' : ''}
              ${isClaimedByOther ? '<span class="claimed-indicator" title="已被 ' + escapeHtml(v.claimedByName || v.claimedBy) + ' 接手">🔒 ' + escapeHtml(v.claimedByName || '') + '</span>' : ''}
            </div>
          </div>
        `;
      }).join('');

      visitorListEl.querySelectorAll('.visitor-item').forEach(item => {
        item.addEventListener('click', () => {
          selectVisitor(item.dataset.id);
        });
      });
    }

    function selectVisitor(id) {
      currentVisitorId = id;
      const visitor = visitors.get(id);
      if (visitor) {
        chatTitleEl.textContent = `对话：${visitor.name}`;
        visitorInfoEl.textContent = `${visitor.name} (ID: ${id})`;
        sessionStatusSelectEl.value = visitor.sessionStatus || 'pending';
        sessionNotesEl.value = visitor.note || '';
        sessionTagsEl.value = (visitor.tags || []).join(', ');
        renderTagsChips(visitor.tags || []);
        visitorPreviewEl.style.display = 'block';
        messageInputEl.disabled = false;
        sendBtnEl.disabled = false;
        updateVisitorStatus();
        updateClaimUI();
        renderVisitorList();
        renderMessages();

        ws.send(JSON.stringify({
          action: 'session_mark_viewed',
          payload: { visitorId: id },
        }));
        visitor.unrepliedCount = 0;
        renderVisitorList();
      }
    }

    function updateVisitorStatus() {
      if (!currentVisitorId) return;
      const visitor = visitors.get(currentVisitorId);
      if (visitor) {
        const lastSeen = visitor.lastSeen ? new Date(visitor.lastSeen).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
        visitorStatusEl.textContent = visitor.online ? '🟢 在线' : `⚫ 离线 (最后活跃: ${lastSeen})`;
      }
    }

    function updateClaimUI() {
      if (!currentVisitorId) return;
      const visitor = visitors.get(currentVisitorId);
      if (!visitor) return;

      claimBtnEl.style.display = 'inline-block';

      if (visitor.claimedBy && visitor.claimedBy === myAgentId) {
        claimBtnEl.textContent = '释放';
        claimBtnEl.className = 'claim-btn release';
        claimedByInfoEl.textContent = '✋ 你已接手';
        claimedByInfoEl.style.display = 'inline';
        claimedWarningEl.style.display = 'none';
      } else if (visitor.claimedBy && visitor.claimedBy !== myAgentId) {
        claimBtnEl.textContent = '接手';
        claimBtnEl.className = 'claim-btn';
        claimedByInfoEl.textContent = '🔒 ' + (visitor.claimedByName || visitor.claimedBy);
        claimedByInfoEl.style.display = 'inline';
        claimedWarningEl.style.display = 'inline';
      } else {
        claimBtnEl.textContent = '接手';
        claimBtnEl.className = 'claim-btn';
        claimedByInfoEl.style.display = 'none';
        claimedWarningEl.style.display = 'none';
      }
    }

    function renderTagsChips(tags) {
      if (!tags || tags.length === 0) {
        tagsDisplayEl.innerHTML = '';
        return;
      }
      tagsDisplayEl.innerHTML = tags.map(t => '<span class="tag-chip">' + escapeHtml(t) + '</span>').join('');
    }

    function renderMessages() {
      if (!currentVisitorId) {
        messageListEl.innerHTML = '<div class="empty-state">选择左侧访客查看对话</div>';
        return;
      }

      const visitor = visitors.get(currentVisitorId);
      if (!visitor || visitor.messages.length === 0) {
        messageListEl.innerHTML = '<div class="empty-state">暂无对话记录</div>';
        return;
      }

      messageListEl.innerHTML = visitor.messages.map(msg => {
        const isVisitor = msg.sender === 'visitor';
        const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        const senderLabel = isVisitor ? visitor.name : '客服';

        if (msg.type === 'image') {
          return `
            <div class="message ${isVisitor ? 'visitor' : 'agent'}">
              <div class="message-type-indicator">${senderLabel} · ${time}</div>
              <div class="message-bubble">
                <img src="${msg.content}" style="max-width: 200px; max-height: 200px; border-radius: 8px;" />
              </div>
            </div>
          `;
        }

        return `
          <div class="message ${isVisitor ? 'visitor' : 'agent'}">
            <div class="message-type-indicator">${senderLabel} · ${time}</div>
            <div class="message-bubble">${escapeHtml(msg.content)}</div>
          </div>
        `;
      }).join('');

      messageListEl.scrollTop = messageListEl.scrollHeight;
    }

    function sendMessage() {
      const text = messageInputEl.value.trim();
      if (!text || !currentVisitorId) return;

      ws.send(JSON.stringify({
        action: 'typing_stop',
        payload: { visitorId: currentVisitorId },
      }));

      ws.send(JSON.stringify({
        action: 'send_message',
        payload: {
          visitorId: currentVisitorId,
          content: text,
          type: 'text',
        },
      }));

      messageInputEl.value = '';
      messageInputEl.style.height = 'auto';
    }

    sendBtnEl.addEventListener('click', sendMessage);

    messageInputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    messageInputEl.addEventListener('input', (e) => {
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';

      if (currentVisitorId) {
        ws.send(JSON.stringify({
          action: 'typing_start',
          payload: { visitorId: currentVisitorId },
        }));

        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          ws.send(JSON.stringify({
            action: 'typing_stop',
            payload: { visitorId: currentVisitorId },
          }));
        }, 3000);
      }
    });

    sessionStatusSelectEl.addEventListener('change', () => {
      if (!currentVisitorId) return;
      const newStatus = sessionStatusSelectEl.value;
      visitors.get(currentVisitorId).sessionStatus = newStatus;
      ws.send(JSON.stringify({
        action: 'session_status_update',
        payload: { visitorId: currentVisitorId, sessionStatus: newStatus },
      }));
      renderVisitorList();
    });

    sessionNotesEl.addEventListener('input', () => {
      if (!currentVisitorId) return;
      if (noteSaveTimeout) clearTimeout(noteSaveTimeout);
      noteSaveTimeout = setTimeout(() => {
        const note = sessionNotesEl.value;
        visitors.get(currentVisitorId).note = note;
        ws.send(JSON.stringify({
          action: 'session_note_update',
          payload: { visitorId: currentVisitorId, note },
        }));
      }, 500);
    });

    sessionTagsEl.addEventListener('input', () => {
      if (!currentVisitorId) return;
      if (tagsSaveTimeout) clearTimeout(tagsSaveTimeout);
      tagsSaveTimeout = setTimeout(() => {
        const tagsRaw = sessionTagsEl.value;
        const tags = tagsRaw.split(/[,，]/).map(t => t.trim()).filter(t => t.length > 0);
        visitors.get(currentVisitorId).tags = tags;
        renderTagsChips(tags);
        ws.send(JSON.stringify({
          action: 'session_tags_update',
          payload: { visitorId: currentVisitorId, tags },
        }));
      }, 500);
    });

    claimBtnEl.addEventListener('click', () => {
      if (!currentVisitorId) return;
      const visitor = visitors.get(currentVisitorId);
      if (!visitor) return;

      const action = (visitor.claimedBy === myAgentId) ? 'release' : 'claim';
      ws.send(JSON.stringify({
        action: 'session_claim',
        payload: { visitorId: currentVisitorId, action },
      }));
    });

    autoReplyToggleEl.addEventListener('click', () => {
      autoReplyEnabled = !autoReplyEnabled;
      updateAutoReplyBtn();
      ws.send(JSON.stringify({
        action: autoReplyEnabled ? 'auto_reply_on' : 'auto_reply_off',
      }));
    });

    function updateAutoReplyBtn() {
      autoReplyToggleEl.className = 'toggle-btn ' + (autoReplyEnabled ? 'on' : 'off');
      autoReplyToggleEl.textContent = '自动回复：' + (autoReplyEnabled ? '开启' : '关闭');
    }

    searchBoxEl.addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderVisitorList();
    });

    document.querySelectorAll('.filter-btn:not(#tagFilterBtn)').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        selectedTagFilter = null;
        tagDropdownEl.classList.remove('show');
        renderVisitorList();
        renderTagDropdown();
      });
    });

    tagFilterBtnEl.addEventListener('click', (e) => {
      e.stopPropagation();
      tagDropdownEl.classList.toggle('show');
    });

    document.addEventListener('click', () => {
      tagDropdownEl.classList.remove('show');
    });

    tagDropdownEl.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
