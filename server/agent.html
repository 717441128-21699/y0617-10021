<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客服控制台 - Chat Widget Test Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 260px;
      background: #1f2937;
      color: white;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar h2 {
      padding: 0 20px 16px;
      font-size: 16px;
      font-weight: 600;
      border-bottom: 1px solid #374151;
    }
    .visitor-list {
      flex: 1;
      overflow-y: auto;
    }
    .visitor-item {
      padding: 12px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .visitor-item:hover {
      background: #374151;
    }
    .visitor-item.active {
      background: #374151;
      border-left-color: #4f46e5;
    }
    .visitor-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
    }
    .visitor-id {
      font-size: 11px;
      opacity: 0.5;
      font-family: monospace;
    }
    .controls {
      padding: 16px 20px;
      border-top: 1px solid #374151;
    }
    .toggle-btn {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.on {
      background: #22c55e;
      color: white;
    }
    .toggle-btn.off {
      background: #6b7280;
      color: white;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: white;
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h3 {
      font-size: 16px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #6b7280;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    .status-dot.disconnected {
      background: #ef4444;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f9fafb;
    }
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .message {
      max-width: 70%;
      margin-bottom: 12px;
    }
    .message.visitor {
      margin-left: auto;
    }
    .message-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .message.visitor .message-bubble {
      background: #4f46e5;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.agent .message-bubble {
      background: white;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }
    .message-meta {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
      padding: 0 4px;
    }
    .message.visitor .message-meta {
      text-align: right;
    }
    .message-type-indicator {
      font-size: 11px;
      padding: 0 4px 4px;
      opacity: 0.6;
    }
    .input-area {
      background: white;
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
    }
    .input-area textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 40px;
      max-height: 120px;
    }
    .input-area textarea:focus {
      border-color: #4f46e5;
    }
    .input-area button {
      padding: 0 24px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .input-area button:hover {
      opacity: 0.9;
    }
    .input-area button:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 14px;
    }
    .visitor-preview {
      padding: 0 24px;
      background: #eef2ff;
      border-bottom: 1px solid #c7d2fe;
      color: #4338ca;
      font-size: 12px;
    }
    .visitor-preview p {
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>💬 客服控制台</h2>
    <div class="visitor-list" id="visitorList">
      <div style="padding: 20px; text-align: center; color: #6b7280; font-size: 13px;">
        暂无访客
      </div>
    </div>
    <div class="controls">
      <button class="toggle-btn on" id="autoReplyToggle">
        自动回复：开启
      </button>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <h3 id="chatTitle">选择一个访客开始对话</h3>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">已连接到服务器</span>
      </div>
    </div>
    <div class="visitor-preview" id="visitorPreview" style="display: none;">
      <p>访客信息：<span id="visitorInfo"></span></p>
    </div>
    <div class="chat-area">
      <div class="message-list" id="messageList">
        <div class="empty-state">选择左侧访客查看对话</div>
      </div>
      <div class="input-area">
        <textarea id="messageInput" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行" disabled></textarea>
        <button id="sendBtn" disabled>发送</button>
      </div>
    </div>
  </div>

  <script>
    const ws = new WebSocket('ws://localhost:8080?role=agent');
    const visitors = new Map();
    let currentVisitorId = null;
    let autoReplyEnabled = true;

    const visitorListEl = document.getElementById('visitorList');
    const messageListEl = document.getElementById('messageList');
    const messageInputEl = document.getElementById('messageInput');
    const sendBtnEl = document.getElementById('sendBtn');
    const chatTitleEl = document.getElementById('chatTitle');
    const statusDotEl = document.getElementById('statusDot');
    const statusTextEl = document.getElementById('statusText');
    const autoReplyToggleEl = document.getElementById('autoReplyToggle');
    const visitorPreviewEl = document.getElementById('visitorPreview');
    const visitorInfoEl = document.getElementById('visitorInfo');

    ws.onopen = () => {
      statusDotEl.className = 'status-dot';
      statusTextEl.textContent = '已连接到服务器';
    };

    ws.onclose = () => {
      statusDotEl.className = 'status-dot disconnected';
      statusTextEl.textContent = '连接断开，请刷新页面重连';
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.action === 'init') {
        const visitorList = data.payload.visitors;
        visitorList.forEach(v => {
          visitors.set(v.visitorId, {
            name: v.visitorName,
            messages: v.messages || [],
          });
        });
        renderVisitorList();
      } else if (data.action === 'message') {
        const msg = data.payload;
        const visitorId = msg.visitorId;

        if (!visitors.has(visitorId)) {
          visitors.set(visitorId, {
            name: msg.visitorName || '访客',
            messages: [],
          });
        }

        visitors.get(visitorId).messages.push(msg);
        renderVisitorList();

        if (visitorId === currentVisitorId) {
          renderMessages();
        }
      } else if (data.action === 'auto_reply_on') {
        autoReplyEnabled = true;
        updateAutoReplyBtn();
      } else if (data.action === 'auto_reply_off') {
        autoReplyEnabled = false;
        updateAutoReplyBtn();
      }
    };

    function renderVisitorList() {
      if (visitors.size === 0) {
        visitorListEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #6b7280; font-size: 13px;">暂无访客</div>';
        return;
      }

      const items = Array.from(visitors.entries())
        .sort((a, b) => {
          const lastA = a[1].messages[a[1].messages.length - 1]?.timestamp || 0;
          const lastB = b[1].messages[b[1].messages.length - 1]?.timestamp || 0;
          return lastB - lastA;
        });

      visitorListEl.innerHTML = items.map(([id, v]) => `
        <div class="visitor-item ${id === currentVisitorId ? 'active' : ''}" data-id="${id}">
          <div class="visitor-name">${escapeHtml(v.name)} (${v.messages.length})</div>
          <div class="visitor-id">${id}</div>
        </div>
      `).join('');

      visitorListEl.querySelectorAll('.visitor-item').forEach(item => {
        item.addEventListener('click', () => {
          selectVisitor(item.dataset.id);
        });
      });
    }

    function selectVisitor(id) {
      currentVisitorId = id;
      const visitor = visitors.get(id);
      if (visitor) {
        chatTitleEl.textContent = `对话：${visitor.name}`;
        visitorInfoEl.textContent = `${visitor.name} (ID: ${id})`;
        visitorPreviewEl.style.display = 'block';
        messageInputEl.disabled = false;
        sendBtnEl.disabled = false;
        renderVisitorList();
        renderMessages();
      }
    }

    function renderMessages() {
      if (!currentVisitorId) {
        messageListEl.innerHTML = '<div class="empty-state">选择左侧访客查看对话</div>';
        return;
      }

      const visitor = visitors.get(currentVisitorId);
      if (!visitor || visitor.messages.length === 0) {
        messageListEl.innerHTML = '<div class="empty-state">暂无对话记录</div>';
        return;
      }

      messageListEl.innerHTML = visitor.messages.map(msg => {
        const isVisitor = msg.sender === 'visitor';
        const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        const senderLabel = isVisitor ? visitor.name : '客服';
        const typeLabel = msg.type === 'image' ? '[图片] ' : '';

        if (msg.type === 'image') {
          return `
            <div class="message ${isVisitor ? 'visitor' : 'agent'}">
              <div class="message-type-indicator">${senderLabel} · ${time}</div>
              <div class="message-bubble">
                <img src="${msg.content}" style="max-width: 200px; max-height: 200px; border-radius: 8px;" />
              </div>
            </div>
          `;
        }

        return `
          <div class="message ${isVisitor ? 'visitor' : 'agent'}">
            <div class="message-type-indicator">${senderLabel} · ${time}</div>
            <div class="message-bubble">${escapeHtml(msg.content)}</div>
          </div>
        `;
      }).join('');

      messageListEl.scrollTop = messageListEl.scrollHeight;
    }

    function sendMessage() {
      const text = messageInputEl.value.trim();
      if (!text || !currentVisitorId) return;

      ws.send(JSON.stringify({
        action: 'send_message',
        payload: {
          visitorId: currentVisitorId,
          content: text,
          type: 'text',
        },
      }));

      messageInputEl.value = '';
      messageInputEl.style.height = 'auto';
    }

    sendBtnEl.addEventListener('click', sendMessage);

    messageInputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    messageInputEl.addEventListener('input', (e) => {
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
    });

    autoReplyToggleEl.addEventListener('click', () => {
      autoReplyEnabled = !autoReplyEnabled;
      updateAutoReplyBtn();
      ws.send(JSON.stringify({
        action: autoReplyEnabled ? 'auto_reply_on' : 'auto_reply_off',
      }));
    });

    function updateAutoReplyBtn() {
      autoReplyToggleEl.className = 'toggle-btn ' + (autoReplyEnabled ? 'on' : 'off');
      autoReplyToggleEl.textContent = '自动回复：' + (autoReplyEnabled ? '开启' : '关闭');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
